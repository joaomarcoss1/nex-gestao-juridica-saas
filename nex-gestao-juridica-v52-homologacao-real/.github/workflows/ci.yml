name: Nex v5.2 CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  validate-local:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run test:contracts
      - run: npm run build
      - run: npm audit --audit-level=high

  supabase-live:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate-local
    env:
      SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
      SUPABASE_TEST_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
      SUPABASE_TEST_ADMIN_EMAIL: ${{ secrets.SUPABASE_TEST_ADMIN_EMAIL }}
      SUPABASE_TEST_ADMIN_PASSWORD: ${{ secrets.SUPABASE_TEST_ADMIN_PASSWORD }}
      SUPABASE_TEST_CLIENT_EMAIL: ${{ secrets.SUPABASE_TEST_CLIENT_EMAIL }}
      SUPABASE_TEST_CLIENT_PASSWORD: ${{ secrets.SUPABASE_TEST_CLIENT_PASSWORD }}
      SUPABASE_TEST_RLS_TABLE: ${{ secrets.SUPABASE_TEST_RLS_TABLE }}
      SUPABASE_TEST_OWN_RECORD_ID: ${{ secrets.SUPABASE_TEST_OWN_RECORD_ID }}
      SUPABASE_TEST_FOREIGN_RECORD_ID: ${{ secrets.SUPABASE_TEST_FOREIGN_RECORD_ID }}
      SUPABASE_TEST_FINANCIAL_ENTRY_ID: ${{ secrets.SUPABASE_TEST_FINANCIAL_ENTRY_ID }}
      REQUIRE_SUPABASE_LIVE_TESTS: ${{ secrets.REQUIRE_SUPABASE_LIVE_TESTS }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:migrations
      - run: npm run test:integration
      - run: npm run test:rls
      - run: npm run test:concurrency

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: validate-local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          VITE_ENABLE_DEMO: "true"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-v52
          path: playwright-report
          retention-days: 7
